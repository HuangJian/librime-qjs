name: macOS build
on:
  workflow_call:
    inputs:
      repository:
        default: HuangJian/librime
        required: false
        type: string
      rime_plugins:
        default: ${{ github.repository }}@${{ github.ref_name }}
        required: false
        type: string
      build_type:
        default: Nightly
        required: false
        type: string
      enable_coverage:
        default: false
        required: false
        type: boolean
jobs:
  build:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: [macos-15, macos-13]
    env:
      boost_version: 1.89.0
      BOOST_ROOT: ${{ github.workspace }}/deps/boost-1.89.0
      RIME_PLUGINS: ${{ inputs.rime_plugins }}
    steps:
#      - name: Configure tmate scrolling
#        # in copy mode (press Ctrl-b [ then use arrow keys or Page Up/Page Down)
#        run: |
#          mkdir -p ~/.tmate
#          echo "set -g history-limit 50000" > ~/.tmate.conf
#          echo "set -g terminal-overrides 'xterm*:smcup@:rmcup@'" >> ~/.tmate.conf
#      - name: Setup tmate session
#        uses: mxschmitt/action-tmate@v3
#        with:
#          limit-access-to-actor: true
#          timeout-minutes: 360
#          detached: true
      - name: Checkout last commit
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repository }}
          submodules: recursive

      - name: Configure build environment
        #  If you need to have llvm first in your PATH, run:
        #   echo 'export PATH="/opt/homebrew/opt/llvm/bin:$PATH"' >> /Users/runner/.bash_profile
        # For compilers to find llvm you may need to set:
        #   export LDFLAGS="-L/opt/homebrew/opt/llvm/lib"
        #   export CPPFLAGS="-I/opt/homebrew/opt/llvm/include"
        # For cmake to find llvm you may need to set:
        #   export CMAKE_PREFIX_PATH="/opt/homebrew/opt/llvm"
        run: |
          brew install llvm ninja
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
          echo git_ref_name="$(git describe --always)" >> $GITHUB_ENV
          

      - name: Configure build variant
        run: |
          echo BUILD_UNIVERSAL=1 >> $GITHUB_ENV

      - name: Install Boost
        run: ./install-boost.sh

      - name: Check submodules
        run: git submodule > submodule-status

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            bin
            include
            lib
            share
          key: ${{ runner.os }}-${{ runner.arch }}-deps-${{ hashFiles('submodule-status') }}

      - name: Build dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: make deps

      - name: Install Rime plugins
        run: ./action-install-plugins-macos.sh

      - name: Get librime-qjs commit hash
        run: |
          cd ./plugins/qjs
          echo qjs_git_ref_name="$(git describe --always)" >> $GITHUB_ENV

      - name: Build and test
        run: |
          if [ "${{ inputs.enable_coverage }}" = "true" ]; then
            cmake . -Bbuild -DCMAKE_BUILD_TYPE=Release -DENABLE_COVERAGE=ON -DENABLE_EXTERNAL_PLUGINS=ON -DBUILD_MERGED_PLUGINS=OFF -DBoost_NO_BOOST_CMAKE=TRUE -DBOOST_ROOT="${{ env.BOOST_ROOT }}" -DCMAKE_INSTALL_PREFIX="./dist" -GNinja
            cmake --build build
            (cd build; ctest --output-on-failure)
          else
            make test
          fi

      - name: Generate coverage report
        if: inputs.enable_coverage
        run: |
          llvm-profdata merge -sparse ./build/*.profraw -o ./build/test.profdata
          llvm-cov show ./build/plugins/qjs/build/librime-qjs-tests -instr-profile=./build/test.profdata -format=html -output-dir=coverage_report -ignore-filename-regex='(thirdparty|tests)/'
          llvm-cov report ./build/plugins/qjs/build/librime-qjs-tests -instr-profile=./build/test.profdata -ignore-filename-regex='(thirdparty|tests)/'

      - name: Create distributable
        run: |
          if [ "${{ inputs.enable_coverage }}" = "true" ]; then
            cmake --build build --target install
            mkdir assets
            cp -r ./version-info.txt ./assets
            cp -r ./dist/lib/** ./assets
            cp -r ./build/plugins/qjs/build/qjs ./assets
          else
            make install
            mkdir assets
            cp -r ./version-info.txt ./assets
            cp -r ./dist/lib/** ./assets
            cp -r ./plugins/qjs/build/qjs ./assets
          fi
          cd ./plugins/qjs
          bash ./tools/update-version.sh ${{ inputs.build_type }}
          cd ../..
          cp -r ./plugins/qjs/contrib/rime.d.ts ./assets
          tar -cjvf librime-qjs-${{ env.qjs_git_ref_name }}-${{ runner.os }}-${{ runner.arch }}.tar.bz2  -C ./assets .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ runner.os }}-${{ runner.arch }}
          path: |
            librime-qjs-${{ env.qjs_git_ref_name }}-${{ runner.os }}-${{ runner.arch }}.tar.bz2

      - name: Upload coverage report
        if: inputs.enable_coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ runner.os }}-${{ runner.arch }}
          path: coverage_report
